<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3: Hero Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero {
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 700px;
        }

        .hero-content h1 {
            font-size: 3rem;
            color: #ffffff;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero-content h1 span {
            color: #ff6b35;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .hero-btn {
            display: inline-block;
            padding: 14px 36px;
            background-color: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .hero-btn:hover {
            background-color: #e55a27;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2rem;
            }

            .hero-content p {
                font-size: 1rem;
            }

            .hero-btn {
                padding: 12px 28px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .hero-content h1 {
                font-size: 1.6rem;
            }

            .hero-content p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Hi, I'm <span>Gilbert Mungai</span></h1>
            <p>Web Developer & Entrepreneur based in Nairobi, Kenya. I build practical tools and real-world web projects.</p>
            <a href="#" class="hero-btn">Get In Touch</a>
        </div>
    </section>

</body>
</html>
