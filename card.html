<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 - Card Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card */
        .card {
            background-color: #ffffff;
            border-radius: 8px;
            width: 300px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* Image */
        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* Content */
        .card-content {
            padding: 16px;
        }

        /* Title */
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        /* Description */
        .card-description {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        /* Tags */
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tag {
            background-color: #e0e7ff;
            color: #4f46e5;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* CTA Button */
        .card-button {
            width: 100%;
            padding: 10px;
            background-color: #4f46e5;
            color: #ffffff;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .card-button:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="card">
        <img class="card-image" src="https://placehold.co/300x180" alt="Card image">
        <div class="card-content">
            <h2 class="card-title">Card Title</h2>
            <p class="card-description">This is a reusable card component built with HTML and CSS for the IYF Season 11 Week 2 challenge.</p>
            <div class="card-tags">
                <span class="tag">HTML</span>
                <span class="tag">CSS</span>
                <span class="tag">Design</span>
            </div>
            <button class="card-button">Learn More</button>
        </div>
    </div>

</body>
</html>
